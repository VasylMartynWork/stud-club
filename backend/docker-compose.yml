services:
  postgres:
    image: postgres:17-alpine
    container_name: stud-club-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: stud_club
      POSTGRES_PASSWORD: stud_club
      POSTGRES_DB: stud_club
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stud_club -d stud_club']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
